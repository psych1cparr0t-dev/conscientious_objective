<!-- @dsCard group="The Olive Tree" viewport="1280x720" name="Interactive olive tree" subtitle="The brand centerpiece — a procedural olive tree on a cobblestone plot, posters nailed to it. Drag to explore." -->
<!-- @startingPoint section="The Olive Tree" subtitle="Interactive three.js olive tree centerpiece with brand header" viewport="1280x720" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Conscientious Objective</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  :root { --paper: #f7f4ef; --warm: #c8a96e; --olive: #4a5240; --ink: #111111; --muted: #888888; --line-3: rgba(0,0,0,0.06); --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1); --dur-base: 0.4s; --font-display: 'Syne', sans-serif; --font-serif: 'Newsreader', serif; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--paper); }
  body { font-family: var(--font-display); color: var(--ink); }

  #scene { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; display: block; }

  /* faint architectural grid lines, matching the brand */
  .gl { position: fixed; background: var(--line-3); pointer-events: none; z-index: 1; }
  .glv { top: 0; bottom: 0; width: 1px; }
  .glh { left: 0; right: 0; height: 1px; }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 3;
    padding: 24px 48px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
  }
  .wordmark { font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
  .price { font-family: var(--font-serif); font-style: italic; font-size: 14px; color: var(--muted); }

  /* ── Centered title ─────────────────────────────────────── */
  .title-wrap {
    position: fixed; top: 84px; left: 0; right: 0; z-index: 2;
    text-align: center; pointer-events: none;
    opacity: 0; animation: rise 1.1s var(--ease-out) 0.3s forwards;
  }
  .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 5px;
    text-transform: uppercase; color: var(--warm); margin-top: 18px;
  }
  h1 {
    font-size: clamp(40px, 7vw, 92px); font-weight: 800;
    line-height: 0.9; letter-spacing: -3px;
  }


  /* ── Footer hint + CTA ──────────────────────────────────── */
  footer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 3;
    padding: 26px 48px;
    display: flex; justify-content: space-between; align-items: flex-end;
    pointer-events: none;
  }
  .hint {
    font-family: var(--font-serif); font-style: italic;
    font-size: 14px; color: var(--muted);
    display: flex; align-items: center; gap: 10px;
    opacity: 0; animation: fade 1s ease 1.4s forwards;
  }
  .hint .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warm); display: inline-block; }
  .btn {
    pointer-events: auto;
    font-family: var(--font-display); font-size: 12px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; color: var(--paper);
    background: var(--ink); border: none; padding: 18px 36px;
    cursor: pointer; position: relative; overflow: hidden;
    opacity: 0; animation: fade 1s ease 1.6s forwards;
  }
  .btn::after {
    content: ""; position: absolute; inset: 0; background: var(--warm);
    transform: scaleX(0); transform-origin: left;
    transition: transform var(--dur-base) var(--ease-out);
  }
  .btn:hover::after { transform: scaleX(1); }
  .btn span { position: relative; z-index: 1; }

  /* loading veil */
  #veil {
    position: fixed; inset: 0; z-index: 5; background: var(--paper);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.8s ease; }
  #veil.gone { opacity: 0; pointer-events: none; }
  #veil .l { font-size: 10px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; color: var(--muted); }

  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 700px) {
    header, footer { padding-left: 24px; padding-right: 24px; }
    .gl { display: none; }
    footer { flex-direction: column; align-items: flex-start; gap: 16px; }
    .title-wrap { top: 76px; }
  }
</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#f7f4ef"/>
      <rect x="46" y="55" width="8" height="30" fill="#8d8475"/>
      <circle cx="50" cy="45" r="22" fill="#6f775c"/>
      <circle cx="36" cy="50" r="13" fill="#7e886a"/>
      <circle cx="64" cy="50" r="13" fill="#5c6349"/>
      <circle cx="50" cy="33" r="14" fill="#899377"/>
      <rect x="30" y="85" width="40" height="3" rx="1.5" fill="#9c958a"/>
    </svg>
  </template>

  <canvas id="scene"></canvas>

  <div class="gl glv" style="left:48px"></div>
  <div class="gl glv" style="right:48px"></div>
  <div class="gl glh" style="top:72px"></div>


  <div class="title-wrap">
    <h1>The Conscientious Objective</h1>
    <div class="eyebrow">A peace education initiative</div>
  </div>

  <footer>
    <div class="hint"><span class="dot"></span>Drag to walk around the tree · scroll to come closer</div>
    <button class="btn"><span>Begin Your Record</span></button>
  </footer>

  <div id="veil"><div class="l">Planting the tree…</div></div>

  <script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <script>
  (function () {
    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf7f4ef);
    scene.fog = new THREE.Fog(0xf7f4ef, 16, 34);

    const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
    camera.position.set(0, 4.6, 11);

    const controls = new THREE.OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.target.set(0, 3.2, 0);
    controls.minDistance = 6;
    controls.maxDistance = 16;
    controls.minPolarAngle = 0.35;
    controls.maxPolarAngle = Math.PI / 2 - 0.04; // never below the ground
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.55;
    controls.enablePan = false;
    canvas.addEventListener('pointerdown', () => { controls.autoRotate = false; });

    /* ── Lighting: warm sun + cool sky fill ─────────────────── */
    const hemi = new THREE.HemisphereLight(0xfdf6e8, 0x6f6a5c, 0.85);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xfff0d6, 1.45);
    sun.position.set(7, 11, 5);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1; sun.shadow.camera.far = 40;
    sun.shadow.camera.left = -12; sun.shadow.camera.right = 12;
    sun.shadow.camera.top = 12; sun.shadow.camera.bottom = -12;
    sun.shadow.bias = -0.0004;
    sun.shadow.radius = 4;
    scene.add(sun);

    const rim = new THREE.DirectionalLight(0xc8a96e, 0.35);
    rim.position.set(-6, 4, -7);
    scene.add(rim);

    /* ══════════════════════════════════════════════════════════
       COBBLESTONE PLOT
       A sunken earth disc ringed and paved with scattered stones.
       ══════════════════════════════════════════════════════════ */
    const plot = new THREE.Group();
    scene.add(plot);

    // earth base disc
    const earthMat = new THREE.MeshStandardMaterial({ color: 0x6a5d4c, roughness: 1 });
    const earth = new THREE.Mesh(new THREE.CircleGeometry(7.4, 64), earthMat);
    earth.rotation.x = -Math.PI / 2;
    earth.position.y = 0.02;
    earth.receiveShadow = true;
    plot.add(earth);

    // a soft surrounding ground (the paper plane) to catch the far shadow
    const groundMat = new THREE.MeshStandardMaterial({ color: 0xece6db, roughness: 1 });
    const ground = new THREE.Mesh(new THREE.CircleGeometry(40, 48), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.02;
    ground.receiveShadow = true;
    scene.add(ground);

    // cobblestones — instanced, scattered in rings within the disc
    const stoneGeo = new THREE.DodecahedronGeometry(0.5, 0);
    stoneGeo.scale(1, 0.42, 1); // flatten into a paver
    const stoneCols = [0x9c958a, 0xb3a99a, 0x8a8175, 0x7d7468, 0xa89f90];
    const stoneMat = new THREE.MeshStandardMaterial({ roughness: 0.95, flatShading: true });
    const COUNT = 320;
    const stones = new THREE.InstancedMesh(stoneGeo, stoneMat, COUNT);
    stones.castShadow = true; stones.receiveShadow = true;
    const m = new THREE.Matrix4();
    const q = new THREE.Quaternion();
    const e = new THREE.Euler();
    const v = new THREE.Vector3();
    const col = new THREE.Color();
    let placed = 0;
    for (let i = 0; i < COUNT * 3 && placed < COUNT; i++) {
      const r = Math.sqrt(Math.random()) * 7.0;
      const a = Math.random() * Math.PI * 2;
      const x = Math.cos(a) * r, z = Math.sin(a) * r;
      if (Math.sqrt(x*x + z*z) < 0.95) continue;       // leave room for the trunk
      const s = 0.34 + Math.random() * 0.5;
      e.set((Math.random()-0.5)*0.25, Math.random()*Math.PI, (Math.random()-0.5)*0.25);
      q.setFromEuler(e);
      v.set(x, 0.12 + Math.random()*0.04, z);
      m.compose(v, q, new THREE.Vector3(s, s, s));
      stones.setMatrixAt(placed, m);
      stones.setColorAt(placed, col.setHex(stoneCols[(Math.random()*stoneCols.length)|0]));
      placed++;
    }
    stones.count = placed;
    stones.instanceMatrix.needsUpdate = true;
    plot.add(stones);

    /* ══════════════════════════════════════════════════════════
       THE OLIVE TREE
       Gnarled silver trunk + forking limbs + soft silver-green
       canopy clusters. Built procedurally from tapered limbs.
       ══════════════════════════════════════════════════════════ */
    const tree = new THREE.Group();
    scene.add(tree);

    const barkMat = new THREE.MeshStandardMaterial({ color: 0x8d8475, roughness: 0.92, flatShading: true });
    const barkDark = new THREE.MeshStandardMaterial({ color: 0x6f6657, roughness: 0.95, flatShading: true });

    // limb: a tapered cylinder from point A to point B
    const up = new THREE.Vector3(0, 1, 0);
    function limb(ax, ay, az, bx, by, bz, rA, rB, mat) {
      const a = new THREE.Vector3(ax, ay, az);
      const b = new THREE.Vector3(bx, by, bz);
      const dir = new THREE.Vector3().subVectors(b, a);
      const len = dir.length();
      const geo = new THREE.CylinderGeometry(rB, rA, len, 7, 1, true);
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true; mesh.receiveShadow = true;
      mesh.position.copy(a).addScaledVector(dir, 0.5);
      mesh.quaternion.setFromUnitVectors(up, dir.clone().normalize());
      tree.add(mesh);
      return b;
    }

    // root flare
    limb(0, 0, 0, 0, 0.5, 0, 0.62, 0.5, barkDark);
    // trunk, slightly leaning & gnarled
    limb(0, 0.5, 0, 0.18, 1.5, 0.05, 0.5, 0.4, barkMat);
    limb(0.18, 1.5, 0.05, 0.05, 2.4, -0.12, 0.4, 0.33, barkMat);

    // main forks from the crown of the trunk
    const forks = [
      [0.05, 2.4, -0.12,  1.5, 3.7, 0.5,  0.30, 0.13],
      [0.05, 2.4, -0.12, -1.3, 3.9, 0.3,  0.30, 0.12],
      [0.05, 2.4, -0.12,  0.4, 4.3, -1.3, 0.30, 0.13],
      [0.05, 2.4, -0.12, -0.5, 4.1, 1.2,  0.28, 0.12],
      [0.05, 2.4, -0.12,  0.9, 4.1, 1.1,  0.26, 0.11]
    ];
    const tips = [];
    forks.forEach(f => {
      limb(f[0],f[1],f[2], f[3],f[4],f[5], f[6],f[7], barkMat);
      // a secondary twig off each fork
      const mx = (f[0]+f[3])/2, my=(f[1]+f[4])/2, mz=(f[2]+f[5])/2;
      limb(mx,my,mz, f[3]+(f[3]-f[0])*0.3, f[4]+0.4, f[5]+(f[5]-f[2])*0.3, 0.12, 0.06, barkMat);
      tips.push(new THREE.Vector3(f[3], f[4], f[5]));
    });

    // ── Canopy: clusters of flat-shaded olive blobs at the limb tips ──
    const leafCols = [0x6f775c, 0x7e886a, 0x5c6349, 0x899377, 0x646b50];
    const blobGeo = new THREE.IcosahedronGeometry(1, 1);
    function canopyCluster(center, radius, n) {
      const g = new THREE.Group();
      for (let i = 0; i < n; i++) {
        const mat = new THREE.MeshStandardMaterial({
          color: leafCols[(Math.random()*leafCols.length)|0],
          roughness: 0.85, flatShading: true });
        const mesh = new THREE.Mesh(blobGeo, mat);
        const s = radius * (0.55 + Math.random()*0.6);
        mesh.scale.set(s, s*0.9, s);
        mesh.position.set(
          (Math.random()-0.5)*radius*1.7,
          (Math.random()-0.5)*radius*1.2,
          (Math.random()-0.5)*radius*1.7);
        mesh.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
        mesh.castShadow = true; mesh.receiveShadow = true;
        g.add(mesh);
      }
      g.position.copy(center);
      tree.add(g);
      return g;
    }
    const canopies = [];
    tips.forEach(t => canopies.push(canopyCluster(t, 1.15, 7)));
    // a big unifying crown
    canopies.push(canopyCluster(new THREE.Vector3(0.1, 4.5, 0.0), 1.7, 11));

    /* ══════════════════════════════════════════════════════════
       POSTERS — printed sheets nailed to the trunk & a low limb
       ══════════════════════════════════════════════════════════ */
    function posterTexture(draw) {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 660;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#f7f4ef'; ctx.fillRect(0,0,c.width,c.height);
      // subtle paper edge
      ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 4;
      ctx.strokeRect(8,8,c.width-16,c.height-16);
      draw(ctx, c.width, c.height);
      const tex = new THREE.CanvasTexture(c);
      tex.anisotropy = 8; tex.encoding = THREE.sRGBEncoding;
      return tex;
    }

    function makePoster(texDraw, w, h, pos, rotY, tilt) {
      const tex = posterTexture(texDraw);
      const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.85, side: THREE.DoubleSide });
      const sheet = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
      sheet.castShadow = true;
      const g = new THREE.Group();
      g.add(sheet);
      // nail
      const nail = new THREE.Mesh(
        new THREE.SphereGeometry(0.045, 10, 10),
        new THREE.MeshStandardMaterial({ color: 0x2a2620, roughness: 0.5, metalness: 0.4 }));
      nail.position.set(0, h/2 - 0.08, 0.02);
      g.add(nail);
      sheet.rotation.x = tilt || 0;
      g.position.copy(pos);
      g.rotation.y = rotY;
      tree.add(g);
      return g;
    }

    // Poster 1 — the manifesto plate, on the trunk facing the camera
    makePoster((ctx, W, H) => {
      ctx.textAlign = 'center';
      ctx.fillStyle = '#c8a96e';
      ctx.font = '700 22px Syne, sans-serif';
      ctx.fillText('A P E A C E   I N I T I A T I V E', W/2, 86);
      ctx.fillStyle = '#111111';
      ctx.font = '800 58px Syne, sans-serif';
      ctx.fillText('The', W/2, 200);
      ctx.fillText('Conscientious', W/2, 262);
      ctx.fillStyle = '#4a5240';
      ctx.font = 'italic 300 70px Newsreader, serif';
      ctx.fillText('Objective', W/2, 340);
      ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(110, 390); ctx.lineTo(W-110, 390); ctx.stroke();
      ctx.fillStyle = '#555555';
      ctx.font = 'italic 300 27px Newsreader, serif';
      ctx.fillText('Monthly coursework, curated', W/2, 448);
      ctx.fillText('literature, and reflective practice', W/2, 486);
      ctx.fillText('for a documented conscience.', W/2, 524);
      ctx.fillStyle = '#111111';
      ctx.font = '700 24px Syne, sans-serif';
      ctx.fillText('$2.50 / MONTH', W/2, 596);
    }, 1.9, 2.45, new THREE.Vector3(0.36, 1.85, 0.55), 0.55, -0.04);

    // Poster 2 — a journal-prompt slip nailed to a low limb
    makePoster((ctx, W, H) => {
      ctx.textAlign = 'center';
      ctx.fillStyle = '#c8a96e';
      ctx.font = '700 22px Syne, sans-serif';
      ctx.fillText('M O N T H   O N E   ·   P R O M P T', W/2, 130);
      ctx.fillStyle = '#111111';
      ctx.font = 'italic 300 40px Newsreader, serif';
      const lines = ['“What is one belief you', 'hold about how people', 'should treat each other —', 'and when did you first', 'know you held it?”'];
      lines.forEach((l, i) => ctx.fillText(l, W/2, 250 + i*64));
      ctx.fillStyle = '#888888';
      ctx.font = 'italic 300 24px Newsreader, serif';
      ctx.fillText('— begin your record', W/2, 590);
    }, 1.5, 1.95, new THREE.Vector3(-1.15, 3.0, 0.9), -0.7, 0.05);

    /* ══════════════════════════════════════════════════════════
       RENDER LOOP
       ══════════════════════════════════════════════════════════ */
    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    function tick() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }

    // wait for brand fonts so poster canvases draw correctly
    const start = () => {
      // redraw posters now fonts are ready by rebuilding their textures
      tick();
      setTimeout(() => document.getElementById('veil').classList.add('gone'), 250);
    };
    if (document.fonts && document.fonts.ready) {
      Promise.race([document.fonts.ready, new Promise(r => setTimeout(r, 1500))]).then(start);
    } else { start(); }
  })();
  </script>
</body>
</html>
